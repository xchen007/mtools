<aside class="app-rail">
  {% for section in shell_rail_sections %}
    <section class="rail-box" data-rail-section="{{ section.title|slugify }}">
      <h2 class="rail-title">{{ section.title }}</h2>
      {% for item in section.items %}
        <div class="rail-item">
          <span>{{ item.label }}</span>
          <span>{{ item.value }}</span>
        </div>
      {% empty %}
        <div class="rail-item rail-item--empty" data-rail-empty>
          <span>No data</span>
          <span>--</span>
        </div>
      {% endfor %}
    </section>
  {% endfor %}
</aside>
