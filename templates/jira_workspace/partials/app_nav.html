<aside class="app-nav app-nav--commercial" data-app-nav>
  <div class="workspace-chip">
    <span>Workspace: core</span>
    <span>Mode: Django</span>
  </div>

  <nav class="nav-block nav-block--query-cards" aria-label="Jira Query Cards">
    {% include "jira_workspace/partials/query_card_nav.html" with query_cards=query_cards selected_card=selected_card %}
  </nav>

  <nav class="nav-block" aria-label="Starred">
    <div class="nav-heading nav-section-label">Starred</div>
    <div class="nav-group nav-group--starred">
      {% for item in shell_starred_items %}
        <a class="nav-link nav-link--starred" href="{{ item.href }}" title="{{ item.label }} · {{ item.group_key }}">
          <span class="nav-link__label">{{ item.label }}</span>
          <span class="nav-badge nav-link__hint">{{ item.group_key }}</span>
        </a>
      {% empty %}
        <span class="nav-empty">No starred items.</span>
      {% endfor %}
    </div>
  </nav>
  <button
    class="app-nav__resize-handle"
    type="button"
    data-sidebar-resize-handle
    aria-label="Resize sidebar"
    title="Resize sidebar"
  ></button>
</aside>
