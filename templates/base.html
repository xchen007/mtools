<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}MTools{% endblock %}</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    body { background: #f8f9fa; }
    .navbar-brand { font-weight: 700; letter-spacing: 1px; }
    .sidebar { min-height: calc(100vh - 56px); background: #fff; border-right: 1px solid #dee2e6; }
    .sidebar .nav-link { color: #495057; border-radius: 6px; margin: 2px 8px; }
    .sidebar .nav-link:hover, .sidebar .nav-link.active { background: #e9f0ff; color: #0d6efd; }
    .sidebar .nav-link i { width: 20px; }
    .main-content { padding: 24px; }
  </style>
</head>
<body>
<nav class="navbar navbar-dark bg-dark px-3">
  <a class="navbar-brand" href="/bisync/"><i class="bi bi-tools me-2"></i>MTools</a>
</nav>
<div class="container-fluid">
  <div class="row">
    <div class="col-auto sidebar py-3" style="width:200px">
      <nav class="nav flex-column">
        <a class="nav-link {% block nav_bisync %}{% endblock %}" href="{% url 'bisync_list' %}">
          <i class="bi bi-arrow-left-right me-2"></i>Bisync
        </a>
        <a class="nav-link {% block nav_sync2pod %}{% endblock %}" href="{% url 'sync2pod_list' %}">
          <i class="bi bi-cloud-upload me-2"></i>Sync2Pod
        </a>
        <hr class="my-2">
        <a class="nav-link {% block nav_settings %}{% endblock %}" href="{% url 'settings' %}">
          <i class="bi bi-gear me-2"></i>设置
        </a>
      </nav>
    </div>
    <div class="col main-content">
      {% block content %}{% endblock %}
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
{% block extra_js %}{% endblock %}
</body>
</html>
